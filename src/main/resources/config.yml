# ============================================================
# Watchcat (by @Az7car) - Enterprise Anti-Cheat Configuration
# ============================================================

# Discord server for appeals
discord:
  invite-link: "https://orvexsmp.net/discord"
  server-name: "OrvexSMP"

# Ban-wave configuration
ban-wave:
  enabled: false
  instant-ban: true
  min-delay-minutes: 30
  max-delay-minutes: 360
  jitter-seconds: 300
  notify-staff: true
  broadcast: false
  confirm-threshold: 0.8

# Chat moderation
chat:
  max-messages-per-second: 4
  max-repeated-messages: 3
  max-caps-ratio: 50
  max-warnings-before-ban: 3
  mute-duration-seconds: 120
  temp-ban-duration-seconds: 3600
  warning-decay-seconds: 300
  block-ip-addresses: true
  block-domains: true
  block-invites: true

# Anti-bot / Anti-raid
antibot:
  max-joins-per-minute: 5
  min-name-length: 2
  max-name-length: 16

raid:
  max-players-per-ip: 3
  max-similar-names: 4
  window-seconds: 60
  auto-ban: true

# Punishment severity tiers (duration in days)
# Multiplier applied per offense count: 1st=1x, 2nd=2x, 3rd=4x, 4th+=permanent
punishment:
  severity:
    critical:
      base-duration-days: 365
      display: "§4CRITICAL"
    high:
      base-duration-days: 180
      display: "§cHIGH"
    medium:
      base-duration-days: 90
      display: "§eMEDIUM"
    low:
      base-duration-days: 30
      display: "§aLOW"
  offense-multiplier:
    "1": 1.0
    "2": 2.0
    "3": 4.0
  ip-ban: true
  offense-storage-file: "offenses.yml"

# Appeal code settings
appeal:
  enabled: true
  code-length: 7
  characters: "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"
  storage-file: "appeals.yml"

# Global performance settings
performance:
  async-threads: 4
  packet-queue-size: 1024
  enable-ml: true
  debug-mode: false

